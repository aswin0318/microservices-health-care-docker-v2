version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      args:
        NODE_ENV: development
    container_name: api_gateway
    env_file:
      - ./api-gateway/config/development.env
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_started
      doctor-service:
        condition: service_started
      appointment-service:
        condition: service_started
    networks: 
      - health_network

  auth-service:
    build:
      context: ./auth-service
      args:
        NODE_ENV: development
    container_name: auth_service
    env_file:
      - ./auth-service/config/development.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    ports:
      - "50052:50051"
    depends_on:
      postgres-auth:
        condition: service_healthy
      user-service:
        condition: service_started
      dynamodb:
        condition: service_started
    networks: 
      - health_network

  user-service:
    build:
      context: ./user-service
      args:
        NODE_ENV: development
    container_name: user_service
    env_file:
      - ./user-service/config/development.env
    volumes:
      - ./user-service:/app
      - /app/node_modules
    ports:
      - "50053:50051"
    depends_on:
      postgres-user:
        condition: service_healthy
    networks: 
      - health_network

  doctor-service:
    build:
      context: ./doctor-service
      args:
        NODE_ENV: development
    container_name: doctor_service
    env_file:
      - ./doctor-service/config/development.env
    volumes:
      - ./doctor-service:/app
      - /app/node_modules
    ports:
      - "50054:50051"
    depends_on:
      postgres-doctor:
        condition: service_healthy
    networks: 
      - health_network

  appointment-service:
    build:
      context: ./appointment-service
      args:
        NODE_ENV: development
    container_name: appointment_service
    env_file:
      - ./appointment-service/config/development.env
    volumes:
      - ./appointment-service:/app
      - /app/node_modules
    ports:
      - "50055:50051"
    depends_on:
      postgres-appointment:
        condition: service_healthy
      doctor-service:
        condition: service_started
    networks: 
      - health_network

  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres_auth
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - health_network

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres_user
    environment:
      POSTGRES_USER: user_user
      POSTGRES_DB: user_db
      POSTGRES_PASSWORD: user_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - health_network

  postgres-doctor:
    image: postgres:15-alpine
    container_name: postgres_doctor
    environment:
      POSTGRES_USER: doctor_user
      POSTGRES_DB: doctor_db
      POSTGRES_PASSWORD: doctor_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_doctor_data:/var/lib/postgresql/data
    networks:
      - health_network

  postgres-appointment:
    image: postgres:15-alpine
    container_name: postgres_appointment
    environment:
      POSTGRES_USER: appointment_user
      POSTGRES_DB: appointment_db
      POSTGRES_PASSWORD: appointment_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_appointment_data:/var/lib/postgresql/data
    networks:
      - health_network

  dynamodb:
    image: amazon/dynamodb-local
    container_name: dynamodb
    ports:
      - "8000:8000"
    networks:
      - health_network

networks:
  health_network:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_user_data:
  postgres_doctor_data:
  postgres_appointment_data:
